        const CustomCursor = () => {
          const [position, setPosition] = useState({ x: 0, y: 0 });
          const [clicked, setClicked] = useState(false);
          const [linkHovered, setLinkHovered] = useState(false);

          useEffect(() => {
            const addEventListeners = () => {
              document.addEventListener("mousemove", onMouseMove);
              document.addEventListener("mousedown", onMouseDown);
              document.addEventListener("mouseup", onMouseUp);
            };

            const removeEventListeners = () => {
              document.removeEventListener("mousemove", onMouseMove);
              document.removeEventListener("mousedown", onMouseDown);
              document.removeEventListener("mouseup", onMouseUp);
            };

            const onMouseMove = (e) => {
              setPosition({ x: e.clientX, y: e.clientY });
              
              // Check if hovering over interactive element
              const target = e.target;
              setLinkHovered(
                target.tagName.toLowerCase() === 'a' ||
                target.tagName.toLowerCase() === 'button' ||
                target.closest('button') ||
                target.closest('a')
              );
            };

            const onMouseDown = () => setClicked(true);
            const onMouseUp = () => setClicked(false);

            addEventListeners();
            return () => removeEventListeners();
          }, []);

          return (

              className={`fixed top-0 left-0 pointer-events-none z-[9999] mix-blend-difference transition-transform duration-100 ease-out will-change-transform hidden md:block`}

        // 2. Animated Background (Canvas)
        const ParticleBackground = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let particles = [];

            const resizeCanvas = () => {
              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;
              initParticles();
            };

            const initParticles = () => {
              particles = [];
              const particleCount = window.innerWidth < 768 ? 30 : 60;
              
              for (let i = 0; i < particleCount; i++) {
                particles.push({
                  x: Math.random() * canvas.width,
                  y: Math.random() * canvas.height,
                  size: Math.random() * 2 + 1,
                  speedX: (Math.random() - 0.5) * 1.5,
                  speedY: (Math.random() - 0.5) * 1.5,
                  opacity: Math.random() * 0.5 + 0.1
                });
              }
            };

            const drawParticles = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.fillStyle = '#000000';
              ctx.fillRect(0, 0, canvas.width, canvas.height); // Black background

              // Draw connecting lines
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
              ctx.lineWidth = 0.5;
              
              for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                  const dx = particles[i].x - particles[j].x;
                  const dy = particles[i].y - particles[j].y;
                  const distance = Math.sqrt(dx * dx + dy * dy);

                  if (distance < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                  }
                }
              }

              // Draw particles
              particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                // Update position
                p.x += p.speedX;
                p.y += p.speedY;

                // Wrap around screen
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
              });

              animationFrameId = requestAnimationFrame(drawParticles);
            };

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            drawParticles();

            return () => {
              window.removeEventListener('resize', resizeCanvas);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full -z-10" />;
        };

        const RevealOnScroll = ({ children, delay = 0 }) => {
          const [isVisible, setIsVisible] = useState(false);
          const ref = useRef(null);

          useEffect(() => {
            const observer = new IntersectionObserver(
              ([entry]) => {
                if (entry.isIntersecting) {
                  setIsVisible(true);
                  observer.unobserve(entry.target);
                }
              },
              { threshold: 0.1 }
            );

            if (ref.current) observer.observe(ref.current);

            return () => {
              if (ref.current) observer.unobserve(ref.current);
            };
          }, []);

          return (
            <div
              ref={ref}
              className={`transition-all duration-1000 ease-out transform ${
                isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20'
              }`}
              style={{ transitionDelay: `${delay}ms` }}
            >
              {children}

            document.addEventListener('contextmenu', preventRightClick);
            document.addEventListener('selectstart', preventSelect);
